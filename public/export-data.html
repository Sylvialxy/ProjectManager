<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据导出</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f7;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 440px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h2 { font-size: 20px; color: #1d1d1f; margin-bottom: 8px; }
    p { color: #86868b; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #0071e3;
      color: white;
      padding: 12px 28px;
      border-radius: 980px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #0077ed; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .result { margin-top: 20px; font-size: 14px; padding: 12px; border-radius: 8px; }
    .result.success { background: #d4edda; color: #155724; }
    .result.error { background: #f8d7da; color: #721c24; }
    .count { background: #f0f0f5; padding: 8px 16px; border-radius: 8px; font-size: 13px; color: #1d1d1f; margin-bottom: 20px; }
    code { background: #f0f0f5; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📦</div>
    <h2>ProjectManager 数据导出</h2>
    <p>点击下方按钮，自动从 localStorage 读取已录入的数据，并下载 <code>shared-data.json</code> 文件。</p>

    <div id="count" class="count" style="display:none"></div>

    <button class="btn" id="btn" onclick="exportData()">导出数据文件</button>

    <div id="result"></div>
  </div>

  <script>
    function exportData() {
      const btn = document.getElementById('btn');
      const result = document.getElementById('result');
      const count = document.getElementById('count');

      try {
        const raw = localStorage.getItem('pm-staffing-v1');

        if (!raw) {
          result.innerHTML = '<div class="result error">未找到数据<br><small>请确认 ProjectManager 已经打开并录入过数据</small></div>';
          return;
        }

        const stored = JSON.parse(raw);

        // Zustand persist 存储格式: { state: { data: {...} } }
        // 兼容旧格式直接存储: { directions, members, projects }
        let data;
        if (stored && stored.state && stored.state.data) {
          data = stored.state.data;
        } else if (stored.directions !== undefined) {
          data = stored;
        } else {
          result.innerHTML = '<div class="result error">数据格式无法识别<br><small>可能是新版数据，请确认</small></div>';
          console.error('Unknown data format:', stored);
          return;
        }

        const exportObj = {
          directions: data.directions || [],
          members: data.members || [],
          projects: data.projects || [],
        };

        // 显示统计
        count.style.display = 'block';
        count.innerHTML = '成员: ' + exportObj.members.length + ' 人 | 项目: ' + exportObj.projects.length + ' 个';

        // 触发下载
        const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'shared-data.json';
        a.click();
        URL.revokeObjectURL(url);

        btn.disabled = true;
        btn.textContent = '已导出 ✓';
        result.innerHTML = '<div class="result success">数据已导出成功！<br><br><small>把下载的 <code>shared-data.json</code> 文件放到以下目录：<br><code>~/Desktop/DevManage/ProjectManager/</code></small></div>';

      } catch (e) {
        result.innerHTML = '<div class="result error">导出失败: ' + e.message + '</div>';
        console.error(e);
      }
    }
  </script>
</body>
</html>
